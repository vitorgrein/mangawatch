name: Verificar capítulo novo

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 BRT
    - cron: "0 11 * * *"  # 08:00 BRT
    - cron: "0 13 * * *"  # 10:00 BRT
    - cron: "0 14 * * *"  # 11:00 BRT
    - cron: "0 15 * * *"  # 12:00 BRT
    - cron: "0 16 * * *"  # 13:00 BRT
    - cron: "0 19 * * *"  # 16:00 BRT
    - cron: "0 21 * * *"  # 18:00 BRT
    - cron: "0 23 * * *"  # 20:00 BRT
    - cron: "0 0 * * *"   # 21:00 BRT
    - cron: "0 2 * * *"   # 23:00 BRT
  workflow_dispatch:

permissions:
  contents: write

# Compartilha a trava com o "Bot de comandos" pra os dois nunca
# escreverem no repositório ao mesmo tempo (evita conflito de push).
concurrency:
  group: mangawatch-escrita
  cancel-in-progress: false

jobs:
  checar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests cloudscraper

      - name: Rodar verificador
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_manga.py

      - name: Salvar estado (se mudou)
        run: |
          if [[ -n "$(git status --porcelain manga_state.json)" ]]; then
            git config user.name "manga-bot"
            git config user.email "bot@users.noreply.github.com"
            git add manga_state.json
            git commit -m "Atualiza último capítulo"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nada mudou, nada pra salvar."
          fi