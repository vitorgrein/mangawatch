# MySQL de teste — APENAS para desenvolvimento/CI (produção não usa Docker).
# Subir:  docker compose -f tests/integration/docker-compose.test.yml up -d --wait
# Rodar:  pytest tests/integration -q
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: testpass
    ports:
      - "3307:3306"
    volumes:
      - ./seed_source.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpass"]
      interval: 2s
      timeout: 5s
      retries: 30
